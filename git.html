 <!-- // To check existing branches git branch
    // to create a new branch git branch 'branchname'
    // To switch to  branch git checkout 'branchname' -->   


    --- Steps to push code to a branch 
    1.git checkout 'branchname'
    2.git add .
    3.git commit -m 'msg'
    4.git push


   -- COMMAND TO MERGE BRANCHES
   1.git checkout main
   2.git merge origin/secondary branchname
